spring.application.name=Restaurant

# Server Port
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/restaurant_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456@
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# JWT Configuration (256-bit hex secret key)
jwt.secret=${JWT_SECRET:change-this-development-secret-to-a-32-byte-minimum-value}
# 15 minutes (900,000 ms)
jwt.expiration-ms=900000
# 7 days (604,800,000 ms)
jwt.refresh-expiration-ms=604800000

# Mail Configuration (Set to standard SMTP, falls back to logger on exception)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload Configuration (Max 10MB per file, 20MB per request)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
